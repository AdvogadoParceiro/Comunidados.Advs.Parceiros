<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunicados — Resolvvi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f12;
      --surface:  #151820;
      --border:   #222530;
      --accent:   #ef3781;
      --accent2:  #ef3781;
      --text:     #fa206d;
      --muted:    #6b7280;
      --success:  #10b981;
      --error:    #ef4444;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(249, 52, 125, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(124,58,237,.12) 0%, transparent 60%);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .logo::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

   h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.75rem;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: .5rem;
  background: linear-gradient(135deg, var(--text) 40%, var(--muted));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

    .subtitle {
      font-size: .875rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .field { margin-bottom: 1.5rem; }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 140px;
      transition: border-color .2s;
      outline: none;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .upload-area {
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      background: var(--bg);
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: rgba(79,110,247,.05);
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 1.5rem;
      margin-bottom: .5rem;
    }

    .upload-label {
      font-size: .875rem;
      color: var(--muted);
    }

    .upload-label span {
      color: var(--accent);
      font-weight: 500;
    }

    .file-name {
      margin-top: .75rem;
      font-size: .8rem;
      color: var(--accent);
      font-weight: 500;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: .5rem;
      position: relative;
      overflow: hidden;
    }

    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .feedback {
      margin-top: 1.25rem;
      padding: .875rem 1rem;
      border-radius: 10px;
      font-size: .875rem;
      font-weight: 500;
      display: none;
      animation: fadeUp .3s ease both;
    }

    .feedback.success {
      background: rgba(16,185,129,.1);
      border: 1px solid rgba(16,185,129,.3);
      color: var(--success);
    }

    .feedback.error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: var(--error);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .info {
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: .5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Resolvvi · Operações</div>
    <h1>Enviar Comunicado</h1>
    <p class="subtitle">A mensagem será disparada automaticamente para todos os canais dos advogados parceiros no Discord.</p>

    <form id="form">
      <div class="field">
        <label>Mensagem *</label>
        <textarea id="mensagem" placeholder="Digite o comunicado aqui..." required></textarea>
      </div>

      <div class="field">
        <label>Arquivo (opcional)</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="arquivo" accept="*/*">
          <div class="upload-icon">📎</div>
          <div class="upload-label"><span>Clique para selecionar</span> ou arraste aqui</div>
          <div class="file-name" id="fileName"></div>
        </div>
      </div>

      <button class="btn" type="submit" id="btn">Disparar Comunicado 🚀</button>

      <div class="feedback" id="feedback"></div>
    </form>

    <hr class="divider">
    <p class="info">Comunicado enviado pela equipe Resolvvi · Todos os canais ativos</p>
  </div>

  <script>
    // ─── Configuração ───────────────────────────────────────────
    const WEBHOOK_URL = 'COLE_AQUI_A_URL_DO_WEBHOOK_N8N';
    const DRIVE_UPLOAD_URL = 'COLE_AQUI_URL_WEBHOOK_UPLOAD_DRIVE'; // opcional

    // ─── Upload area drag & drop ────────────────────────────────
    const uploadArea = document.getElementById('uploadArea');
    const fileInput  = document.getElementById('arquivo');
    const fileName   = document.getElementById('fileName');

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) {
        fileName.textContent = '✓ ' + fileInput.files[0].name;
        fileName.style.display = 'block';
      }
    });

    ['dragover', 'dragleave', 'drop'].forEach(evt => {
      uploadArea.addEventListener(evt, e => {
        e.preventDefault();
        uploadArea.classList.toggle('dragover', evt === 'dragover');
        if (evt === 'drop' && e.dataTransfer.files[0]) {
          fileInput.files = e.dataTransfer.files;
          fileName.textContent = '✓ ' + e.dataTransfer.files[0].name;
          fileName.style.display = 'block';
        }
      });
    });

    // ─── Submit ─────────────────────────────────────────────────
    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();

      const mensagem = document.getElementById('mensagem').value.trim();
      const arquivo  = fileInput.files[0] || null;
      const btn      = document.getElementById('btn');
      const feedback = document.getElementById('feedback');

      if (!mensagem) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Enviando...';
      feedback.style.display = 'none';

      try {
        let arquivo_url = '';
        let arquivo_nome = '';

        // Se tiver arquivo, envia para webhook de upload do Drive
        if (arquivo && DRIVE_UPLOAD_URL !== 'COLE_AQUI_URL_WEBHOOK_UPLOAD_DRIVE') {
          const formData = new FormData();
          formData.append('file', arquivo);
          const uploadRes = await fetch(DRIVE_UPLOAD_URL, { method: 'POST', body: formData });
          const uploadData = await uploadRes.json();
          arquivo_url  = uploadData.url  || '';
          arquivo_nome = uploadData.nome || arquivo.name;
        }

        // Envia comunicado para o n8n
        const payload = { mensagem, arquivo_url, arquivo_nome };
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('Erro ao enviar.');

        feedback.className = 'feedback success';
        feedback.textContent = '✅ Comunicado enviado para todos os canais!';
        feedback.style.display = 'block';
        document.getElementById('mensagem').value = '';
        fileInput.value = '';
        fileName.style.display = 'none';

      } catch (err) {
        feedback.className = 'feedback error';
        feedback.textContent = '❌ Erro ao enviar. Tente novamente ou contate o suporte.';
        feedback.style.display = 'block';
      }

      btn.disabled = false;
      btn.innerHTML = 'Disparar Comunicado 🚀';
    });
  </script>
</body>
</html>
